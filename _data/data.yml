          Empirical and theory driven transformation of doctoral research into humane and
          tailored policy recommendations for national security. 

      - role: Doctoral Research Intern
        time: 2023 - 2024
        company: Modeling and Simulation Group, Oak Ridge National Laboratory
        details: |
          Text inference of noisy and sparce Arabic data to English for dissertation work.  
   
      - role: Research Analyst (Consultant)
        time: 2014 - 2018
        company: World Bank
        details: |
          Prior to graduate studies, I worked across World Bank groups and sectors including the Development Economics Research
          Group, Health Financing, Poverty and Inequality, and Conflict, Fragility and Violence as a research analyst. 
          The cross-cutting nature of this work has greatly influenced the interdisciplinary and policy relevant 
          focus of my research, while primarily working with Bank economists on fragility, conflict and violence as part
          of my dissertation work.
